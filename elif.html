<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>elif için</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@500;600;700&family=Jost:wght@300;400;500&display=swap');

  :root{
    --blush-1:#fdf2f4;
    --blush-2:#f7dde3;
    --rose-1:#e8a7b8;
    --rose-2:#c96b85;
    --rose-deep:#8c3c52;
    --cream:#fffaf6;
    --ink:#5a3340;
    --gold:#d8a86a;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    width:100%;
    height:100%;
    background:var(--blush-1);
    color:var(--ink);
    font-family:'Jost',sans-serif;
    overflow-x:hidden;
    overflow-y:auto;
    scroll-behavior:smooth;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  .stage{
    position:relative;
    min-height:100vh;
    width:100%;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:6vh 6vw 14vh 6vw;
    text-align:center;
  }
  .stage.active{display:flex;}
  .stage.fade-in{animation:fadeIn 1.1s ease both;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- background ambience ---------- */
  .ambient{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(232,167,184,0.35), transparent 55%),
      radial-gradient(ellipse at 85% 80%, rgba(216,168,106,0.18), transparent 50%),
      var(--blush-1);
  }
  .petal{
    position:fixed; top:-5vh; z-index:1; pointer-events:none;
    opacity:0.8;
    animation:fall linear infinite;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(380deg); }
  }

  /* ============ ACT 1 : ACILIS ============ */
  .eyebrow{
    font-family:'Caveat',cursive;
    font-size:clamp(1.3rem,2.4vw,1.7rem);
    color:var(--rose-2);
    margin:0 0 6px 0;
    letter-spacing:0.5px;
  }
  .title-1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-size:clamp(2.6rem,7vw,4.6rem);
    line-height:1.05;
    margin:0 0 18px 0;
    color:var(--rose-deep);
  }
  .title-1 em{
    font-style:italic;
    color:var(--rose-2);
  }
  .sub-1{
    max-width:480px;
    font-weight:300;
    font-size:clamp(0.95rem,1.6vw,1.05rem);
    color:#a06478;
    line-height:1.7;
    margin:0 0 48px 0;
  }

  .open-btn{
    position:relative;
    border:none;
    cursor:pointer;
    padding:20px 52px;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(1.05rem,2vw,1.3rem);
    color:var(--cream);
    background:linear-gradient(135deg,var(--rose-1),var(--rose-2));
    border-radius:60px;
    box-shadow:0 8px 24px rgba(201,107,133,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
    letter-spacing:0.5px;
    transition:transform 0.35s ease, box-shadow 0.35s ease;
    animation:breathe 3.2s ease-in-out infinite;
  }
  .open-btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 14px 30px rgba(201,107,133,0.45), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .open-btn:active{ transform:translateY(0) scale(0.98); }
  @keyframes breathe{
    0%,100%{ box-shadow:0 8px 24px rgba(201,107,133,0.35), inset 0 1px 0 rgba(255,255,255,0.4);}
    50%{ box-shadow:0 12px 32px rgba(201,107,133,0.5), inset 0 1px 0 rgba(255,255,255,0.5);}
  }
  .open-btn .heart-mark{
    margin-left:10px;
    display:inline-block;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}

  /* ============ ACT 2 : BUKET ============ */
  .title-2{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(1.5rem,3.2vw,2.1rem);
    color:var(--rose-deep);
    margin:0 0 6px 0;
  }
  .sub-2{
    font-family:'Caveat',cursive;
    font-size:clamp(1.1rem,2vw,1.35rem);
    color:var(--rose-2);
    margin:0 0 24px 0;
  }
  .bouquet-wrap{
    width:min(82vw,440px);
    filter:drop-shadow(0 18px 30px rgba(140,60,82,0.18));
    opacity:0;
    animation:bouquetIn 0.9s ease both;
  }
  .bouquet-wrap svg{ width:100%; height:auto; display:block; }
  @keyframes bouquetIn{ from{ opacity:0; transform:translateY(14px) scale(0.96);} to{ opacity:1; transform:translateY(0) scale(1);} }

  /* ============ ACT 3 : GALERI ============ */
  .title-3{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-style:italic;
    font-size:clamp(1.7rem,3.6vw,2.4rem);
    color:var(--rose-deep);
    margin:0 0 36px 0;
  }
  .gallery{
    position:relative;
    display:flex;
    flex-direction:column;
    gap:0;
    width:min(58vw,260px);
    background:var(--cream);
    padding:18px 18px 28px 18px;
    border-radius:4px;
    box-shadow:0 18px 40px rgba(140,60,82,0.22);
    opacity:0;
    animation:stripIn 0.7s ease 0.1s both;
  }
  @keyframes stripIn{ from{opacity:0; transform:translateY(20px) rotate(-1.5deg);} to{opacity:1; transform:translateY(0) rotate(-1.5deg);} }
  .gallery::before,
  .gallery::after{
    content:'';
    position:absolute;
    left:6px; right:6px;
    height:10px;
    background-image:radial-gradient(circle, var(--blush-1) 3px, transparent 3.2px);
    background-size:16px 10px;
    background-repeat:repeat-x;
  }
  .gallery::before{ top:5px; }
  .gallery::after{ bottom:14px; }
  .frame{
    position:relative;
    aspect-ratio:5/4;
    background:#1c1416;
    border-bottom:3px solid var(--cream);
    overflow:hidden;
    opacity:0;
    animation:photoIn 0.5s ease both;
  }
  .frame:last-child{ border-bottom:none; }
  .frame:nth-child(1){ animation-delay:0.3s;}
  .frame:nth-child(2){ animation-delay:0.42s;}
  .frame:nth-child(3){ animation-delay:0.54s;}
  .frame:nth-child(4){ animation-delay:0.66s;}
  .frame:nth-child(5){ animation-delay:0.78s;}
  .frame:nth-child(6){ animation-delay:0.90s;}
  @keyframes photoIn{ from{opacity:0;} to{opacity:1;} }
  .frame .pic{
    width:100%; height:100%;
    background:linear-gradient(135deg,#3a2a30,#2a1d22);
    display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.45);
    overflow:hidden;
  }
  .frame .pic img{ width:100%; height:100%; object-fit:cover; display:block; filter:saturate(0.9) contrast(1.03); }
  .frame .pic span{
    font-family:'Jost',sans-serif;
    font-weight:300;
    font-size:0.7rem;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .strip-label{
    font-family:'Caveat',cursive;
    font-size:1rem;
    color:var(--rose-2);
    text-align:center;
    margin-top:10px;
  }
  .gallery-note{
    font-family:'Jost',sans-serif;
    font-weight:300;
    font-size:0.78rem;
    color:#a06478;
    max-width:320px;
    margin:22px 0 10px 0;
    line-height:1.6;
  }

  /* ============ ACT 4 : ASK MEKTUPLARI ============ */
  .title-4{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-style:italic;
    font-size:clamp(1.7rem,3.6vw,2.3rem);
    color:var(--rose-deep);
    margin:0 0 40px 0;
  }
  .sub-4{
    font-family:'Jost',sans-serif;
    font-weight:300;
    font-size:0.95rem;
    color:#a06478;
    margin:0 0 32px 0;
    max-width:440px;
  }
  .hearts-field{
    position:relative;
    width:min(92vw,700px);
    min-height:280px;
    display:flex;
    flex-wrap:wrap;
    gap:18px;
    align-items:center;
    justify-content:center;
  }
  .mini-heart{
    width:62px; height:56px;
    cursor:pointer;
    background:none;
    border:none;
    padding:0;
    position:relative;
    transition:transform 0.25s ease;
  }
  .mini-heart svg{ width:100%; height:100%; filter:drop-shadow(0 4px 8px rgba(140,60,82,0.25)); }
  .mini-heart:hover{ transform:scale(1.14) rotate(-4deg); }
  .mini-heart:active{ transform:scale(0.95); }

  .big-heart{
    width:min(46vw,210px);
    height:min(42vw,190px);
    cursor:pointer;
    background:none;
    border:none;
    padding:0;
    position:relative;
    transition:transform 0.3s ease;
    animation:heartBeat 2.4s ease-in-out infinite;
  }
  .big-heart svg{ width:100%; height:100%; filter:drop-shadow(0 10px 22px rgba(140,60,82,0.32)); }
  .big-heart:hover{ transform:scale(1.08); }
  .big-heart:active{ transform:scale(0.94); }
  @keyframes heartBeat{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.05); }
  }

  .note-card{
    position:fixed;
    inset:0;
    background:rgba(140,60,82,0.35);
    backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease;
    padding:24px;
  }
  .note-card.show{ opacity:1; pointer-events:auto; }
  .note-inner{
    background:var(--cream);
    border-radius:18px;
    padding:40px 32px;
    max-width:400px;
    text-align:center;
    box-shadow:0 24px 50px rgba(0,0,0,0.25);
    transform:scale(0.85);
    transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  .note-card.show .note-inner{ transform:scale(1); }
  .note-inner p{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:1.35rem;
    color:var(--rose-deep);
    line-height:1.55;
    margin:0 0 22px 0;
  }
  .note-close{
    border:none; cursor:pointer;
    background:var(--rose-2);
    color:var(--cream);
    font-family:'Jost',sans-serif;
    font-size:0.85rem;
    padding:10px 26px;
    border-radius:30px;
    letter-spacing:0.5px;
  }
  .note-close:hover{ background:var(--rose-deep); }

  .tap-again{
    margin-top:30px;
    font-family:'Caveat',cursive;
    font-size:1.2rem;
    color:var(--rose-2);
  }

  /* ---------- nav buttons ---------- */
  .next-btn{
    position:fixed;
    bottom:max(24px, 5vh);
    right:max(20px, 6vw);
    z-index:1000;
    border:none;
    cursor:pointer;
    background:var(--cream);
    color:var(--rose-deep);
    font-family:'Jost',sans-serif;
    font-weight:500;
    font-size:0.9rem;
    letter-spacing:0.5px;
    padding:14px 26px;
    border-radius:40px;
    box-shadow:0 8px 20px rgba(140,60,82,0.22);
    display:flex; align-items:center; gap:8px;
    opacity:0;
    animation:btnIn 0.6s ease 0.4s both;
    transition:transform 0.3s ease, box-shadow 0.3s ease;
  }
  .next-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 26px rgba(140,60,82,0.3); }
  .next-btn svg{ width:16px; height:16px; flex-shrink:0; }
  @keyframes btnIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  footer.sig{
    position:fixed;
    bottom:2.2vh; left:0; right:0;
    text-align:center;
    font-family:'Caveat',cursive;
    color:rgba(140,60,82,0.45);
    font-size:0.95rem;
    z-index:1;
    pointer-events:none;
  }
</style>
</head>
<body>

<div class="ambient"></div>
<div id="petals"></div>

<!-- ACT 1 -->
<section class="stage active" id="stage-1">
  <p class="eyebrow">senin için</p>
  <h1 class="title-1">Elif <em>♡</em></h1>
  <p class="sub-1">seni çok seviyorum ❤️</p>
  <button class="open-btn" id="openBtn" type="button">
    aççç
    <span class="heart-mark">♡</span>
  </button>
</section>

<!-- ACT 2 : BUKET -->
<section class="stage" id="stage-2">
  <p class="title-2">BAKKKK</p>
  <p class="sub-2">çiçek yaptım senin için</p>

  <div class="bouquet-wrap">
    <svg viewBox="0 0 420 440" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- wrap paper -->
      <path d="M120 300 L210 430 L300 300 Z" fill="#fbeef0" stroke="#e8c3cc" stroke-width="2"/>
      <path d="M140 290 L210 410 L280 290 Z" fill="#f7dde3" opacity="0.7"/>

      <g>
        <path d="M170 300 Q165 240 150 200" stroke="#7da487" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>
      <g>
        <path d="M210 300 Q210 230 210 170" stroke="#7da487" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>
      <g>
        <path d="M250 300 Q258 235 270 195" stroke="#7da487" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>

      <g>

      <g>
        <circle cx="210" cy="165" r="34" fill="#f4c9d4"/>
        <path d="M210 134 Q233 142 233 165 Q233 188 210 197 Q187 188 187 165 Q187 142 210 134Z" fill="#edabbe"/>
        <path d="M210 146 Q224 151 224 165 Q224 180 210 186 Q196 180 196 165 Q196 151 210 146Z" fill="#e293ab"/>
        <path d="M210 156 Q217 159 217 165 Q217 172 210 175 Q203 172 203 165 Q203 159 210 156Z" fill="#d97891"/>
        <circle cx="210" cy="165" r="4" fill="#c45f7c"/>
      </g>

      <!-- ROSE 3 (right) -->
      <g>
        <circle cx="270" cy="185" r="25" fill="#f0bdc9"/>
        <path d="M270 161 Q287 168 287 185 Q287 202 270 209 Q253 202 253 185 Q253 168 270 161Z" fill="#e9a3b6"/>
        <path d="M270 170 Q279 174 279 185 Q279 196 270 200 Q261 196 261 185 Q261 174 270 170Z" fill="#df8aa1"/>

      </g>

      <!-- small bud -->
      <g>
        <ellipse cx="235" cy="205" rx="13" ry="16" fill="#e9a3b6"/>
        <ellipse cx="235" cy="205" rx="7" ry="10" fill="#d3708b"/>

      <!-- ribbon -->
      <g>
        <path d="M170 305 Q210 320 250 305 L250 320 Q210 333 170 320 Z" fill="#d8a86a"/>
        <path d="M195 318 L188 340 L205 330 Z" fill="#cf9c5c"/>
        <path d="M225 318 L232 340 L215 330 Z" fill="#cf9c5c"/>
      </g>
    </svg>
  </div>
</section>

<!-- ACT 3 : GALERI -->

  <h2 class="title-3">biz ❤️</h2>

<script>
  // ---- petals ----
  const petalContainer = document.getElementById('petals');
  function spawnPetal(){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 8 + Math.random()*10;
    p.style.left = Math.random()*100 + 'vw';
    p.style.width = size+'px';
    p.style.height = size*0.8+'px';
    p.style.background = Math.random() > 0.5 ? '#eda9ba' : '#f4c9d4';
    p.style.borderRadius = '0 100% 0 100%';
    p.style.animationDuration = (7 + Math.random()*6) + 's';
    petalContainer.appendChild(p);
    setTimeout(()=>p.remove(), 14000);
  }
  setInterval(spawnPetal, 900);
  for(let i=0;i<5;i++) setTimeout(spawnPetal, i*300);

  // ---- stage nav ----
  function goTo(n){
    document.querySelectorAll('.stage').forEach(s=>s.classList.remove('active','fade-in'));
    const next = document.getElementById('stage-'+n);
    next.classList.add('active','fade-in');
    window.scrollTo({top:0,behavior:'smooth'});

    const btn3 = document.getElementById('btnTo3');
    const btn4 = document.getElementById('btnTo4');
    btn3.style.display = (n === 2) ? 'flex' : 'none';
    btn4.style.display = (n === 3) ? 'flex' : 'none';
  }
  // beim Laden: nur Stage 1 aktiv, beide next-Buttons verstecken
  document.getElementById('btnTo3').style.display = 'none';
  document.getElementById('btnTo4').style.display = 'none';

  // ---- start button (Seite 1) ----
  document.getElementById('openBtn').addEventListener('click', function(){
    goTo(2);
  });

  // ---- rastgele ask mektuplari ----
  const notes = [
    "sıradan günleri bile sadece ikimizin anladığı bir şakaya çeviriyorsun.",
    "üç dilde bir şeyi yanlış söyleyişin var ya — hâlâ günün en sevdiğim anı oluyor.",
    "küçük şeyleri hatırlıyorsun. bunu kimse yapmıyor. sen yapıyorsun.",
    "seninle birlikteyken kendimi daha çok seviyorum. bu nadir bir şey.",
    "bütün bedeninle gülüyorsun, ben de buna sebep olmaktan asla yorulmayacağım.",
    "ne kadar uzakta olursak olalım, sen hâlâ eve gelmek gibisin.",
    "seninle sessizlik bile bir şey ifade ediyor.",
    "telefonda 'bir saniye' deyip yarım saat anlattığın hikayeleri özlüyorum şu an bile.",
    "bana kızdığında bile gözlerin gülüyor, biliyor musun?",
    "seninle plan yapmak, planın kendisinden daha güzel."
  ];

  const heartSVG = `<svg viewBox="0 0 32 29"><path class="heart-fill" d="M16 28.5 S2 18 2 9.5 C2 3.5 7 0.5 11 2.5 C13.5 3.7 16 7 16 7 S18.5 3.7 21 2.5 C25 0.5 30 3.5 30 9.5 C30 18 16 28.5 16 28.5 Z" fill="#e391a7" stroke="#c96b85" stroke-width="1"/></svg>`;

  const field = document.getElementById('heartsField');

  let lastIndex = -1;
  function getRandomNote(){
    let idx;
    do {
      idx = Math.floor(Math.random() * notes.length);
    } while (idx === lastIndex && notes.length > 1);
    lastIndex = idx;
    return notes[idx];
  }

  const bigHeart = document.createElement('button');
  bigHeart.className = 'big-heart';
  bigHeart.innerHTML = heartSVG;
  bigHeart.setAttribute('aria-label', 'aşk mektubu');
  bigHeart.onclick = () => openNote(getRandomNote());
  field.appendChild(bigHeart);

  function openNote(text){
    document.getElementById('noteText').textContent = text;
    document.getElementById('noteCard').classList.add('show');
  }
  function closeNote(){
    document.getElementById('noteCard').classList.remove('show');
  }
</script>

</body>
</html>
